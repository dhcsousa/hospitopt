# yaml-language-server: $schema=../schemas/worker-schema.json

poll_interval_seconds: 10.0

# Routing backend: "valhalla" (free, self-hosted, historical traffic if available) or "google" (paid, real-time traffic)
routing:
  backend: valhalla
  url: http://localhost:8002
  costing: auto
# To switch to Google Maps, replace the routing section above with:
# routing:
#   backend: google
#   api_key: ENV("GOOGLE_MAPS_API_KEY")

optimization:
  allow_reassign_in_transit: false
  speed_factor: 1.3
  allow_hospital_reassignment: true

db_connection:
  host: ENV("HOSPITOPT_DB_HOST")
  port: 5432
  database: hospitopt
  user: hospitopt_user
  password: ENV("HOSPITOPT_DB_PASSWORD")

ingestion:
  type: api
  host: http://localhost:8001
